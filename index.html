<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isah's Store | FTF Marretas</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --rosa-pastel: #ffe5ec;
            --rosa-medio: #ffb3c6;
            --rosa-escuro: #ff85a1;
            --dourado: #f4d068;
            --dourado-brilho: #f7e1a0;
            --branco-vidro: rgba(255, 255, 255, 0.5);
            --borda-vidro: rgba(255, 255, 255, 0.6);
            --texto-escuro: #4a3b40;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; scroll-behavior: smooth; }

        body {
            background: linear-gradient(135deg, #ffe5ec 0%, #ffcad4 50%, #b5e2fa 100%);
            background-size: 400% 400%;
            animation: gradientBg 15s ease infinite;
            color: var(--texto-escuro);
            min-height: 100vh;
        }

        @keyframes gradientBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #sakura-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 99; }

        .petal {
            position: absolute; background: linear-gradient(to bottom right, #ffb3c6, #ffe5ec);
            border-radius: 150% 0% 150% 150%/150% 0% 150% 150%; opacity: 0.8; animation: FloatDown linear infinite;
        }

        @keyframes FloatDown {
            0% { transform: translateY(-10px) rotate(0deg); opacity: 0; }
            100% { transform: translateY(100vh) translateX(100px) rotate(720deg); opacity: 0; }
        }

        /* Splash Screen */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #ffe5ec, #ffcad4);
            z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.6s ease;
        }

        .splash-logo { font-family: 'Fredoka', sans-serif; font-size: 3.5rem; color: white; text-shadow: 3px 3px 0px var(--rosa-escuro); }

        .btn-enter {
            margin-top: 30px; padding: 15px 45px; font-size: 1.3rem; font-family: 'Fredoka', sans-serif;
            background: linear-gradient(135deg, var(--dourado), #f39c12); color: white; border: 3px solid white;
            border-radius: 50px; cursor: pointer; box-shadow: 0 8px 20px rgba(244,208,104,0.4);
        }

        #main-app { display: none; opacity: 0; transition: opacity 0.8s ease; }

        .glass-panel {
            background: var(--branco-vidro); backdrop-filter: blur(12px); border: 2px solid var(--borda-vidro);
            border-radius: 24px; box-shadow: 0 8px 32px 0 rgba(255, 179, 198, 0.15);
        }

        header { margin: 10px auto; width: 94%; max-width: 1200px; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }

        .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-top: 20px; }
        
        .product-card { padding: 20px; text-align: center; }

        /* Nova seção de busca */
        .search-request-section {
            max-width: 1200px; margin: 40px auto; width: 94%; padding: 40px; text-align: center;
        }

        .btn-request {
            display: inline-block; margin-top: 20px; padding: 15px 30px; background: #25d366; color: white;
            border-radius: 50px; text-decoration: none; font-weight: bold; transition: transform 0.3s;
        }
        
        .btn-request:hover { transform: scale(1.05); }

        footer { text-align: center; padding: 30px; background: rgba(255,255,255,0.2); border-top: 2px solid var(--borda-vidro); }
    </style>
</head>
<body>

    <div id="sakura-container"></div>

    <section id="splash-screen">
        <div class="splash-content" style="text-align: center;">
            <h1 class="splash-logo">Isah's Store</h1>
            <p style="font-size: 1.2rem; font-weight: 600;">Marretas Exclusivas do FTF 🌸</p>
            <button class="btn-enter" id="btn-entrar-loja">Entrar na Loja ✨</button>
        </div>
    </section>

    <div id="main-app">
        <header class="glass-panel">
            <a href="#" class="logo" style="font-family:'Fredoka'; font-size:1.5rem;">Isah's Store</a>
            <button class="cart-icon-btn" onclick="toggleCart()">
                <i class="fa-solid fa-basket-shopping"></i> <span id="cart-count">0</span>
            </button>
        </header>

        <main class="shop-container" style="max-width: 1200px; margin: 20px auto; width: 94%;">
            <div class="catalog-grid" id="products-grid"></div>

            <!-- NOVA SEÇÃO DE CONTATO -->
            <section class="search-request-section glass-panel">
                <h2 style="font-family: 'Fredoka'; color: var(--rosa-escuro);">Não achou a marreta que queria?</h2>
                <p style="margin: 15px 0;">Mande uma mensagem personalizada agora e verifique a disponibilidade!</p>
                <a href="https://api.whatsapp.com/send?phone=5591984233927&text=Oi!%20Estou%20no%20site%20da%20Isah's%20Store%20e%20n%C3%A3o%20achei%20a%20marreta%20que%20procuro.%20Voc%C3%AA%20poderia%20verificar%20a%20disponibilidade%20para%20mim?" class="btn-request" target="_blank">
                    <i class="fa-brands fa-whatsapp"></i> Pedir Marreta via WhatsApp
                </a>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Isah's Store. Todos os direitos reservados.</p>
        </footer>
    </div>

    <script>
        const estoqueMarretas = [
            { id: 1, nome: "Party Balloons", raridade: "lendario", preco: 10.00, imagem: "Party Balloons.webp" },
            { id: 2, nome: "Lovesick", raridade: "lendario", preco: 8.00, imagem: "Lovesick Bow (1).webp" }
        ];

        document.getElementById('btn-entrar-loja').addEventListener('click', function() {
            const splash = document.getElementById('splash-screen');
            const main = document.getElementById('main-app');
            splash.style.opacity = '0';
            setTimeout(() => { splash.style.display = 'none'; main.style.display = 'block'; main.style.opacity = '1'; }, 600);
        });

        function renderProducts(produtos) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = produtos.map(p => `
                <div class="product-card glass-panel">
                    <h3 class="product-name">${p.nome}</h3>
                    <p>R$ ${p.preco.toFixed(2)}</p>
                    <button class="btn-buy" style="margin-top:10px;">Comprar</button>
                </div>
            `).join('');
        }

        renderProducts(estoqueMarretas);
        const estoqueMarretas = [
            { id: 1, nome: "Party Balloons", raridade: "lendario", preco: 10.00, imagem: "Party Balloons.webp" },
            { id: 2, nome: "Lovesick", raridade: "lendario", preco: 8.00, imagem: "Lovesick Bow (1).webp" },
            { id: 3, nome: "Gothic Bouquet", raridade: "lendario", preco: 6.00, imagem: "Gothic Bouquet (1).webp" },
            { id: 4, nome: "Devilish Candle", raridade: "lendario", preco: 6.00, imagem: "Devilish Candle.webp" },
            { id: 5, nome: "Slice", raridade: "lendario", preco: 5.00, imagem: "Pumpkin Slice.webp" },
            { id: 6, nome: "Spooky", raridade: "lendario", preco: 5.00, imagem: "Spooky Brew (1).webp" },
            { id: 7, nome: "Ice Cream Mix", raridade: "lendario", preco: 4.00, imagem: "Icecream Mix (1).webp" }
        ];
    </script>
</body>
</html>
